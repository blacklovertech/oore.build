name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify-tag-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"; then
            echo "Tag must point to a commit on origin/master."
            exit 1
          fi

  build-macos:
    needs: verify-tag-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release -p oored -p oore

      - name: Package release artifact
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ARCH="${{ matrix.arch }}"
          ASSET_NAME="oore_${VERSION}_darwin_${ARCH}.tar.gz"
          STAGE_DIR="$(mktemp -d)"

          mkdir -p "$STAGE_DIR/bin"
          cp target/release/oored "$STAGE_DIR/bin/oored"
          cp target/release/oore "$STAGE_DIR/bin/oore"
          cp LICENSE "$STAGE_DIR/LICENSE"
          printf '%s\n' "$VERSION" > "$STAGE_DIR/VERSION"

          tar -C "$STAGE_DIR" -czf "$ASSET_NAME" .
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  publish-release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: release-*

      - name: Verify asset contract and generate checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM64_ASSET="oore_${VERSION}_darwin_arm64.tar.gz"
          X64_ASSET="oore_${VERSION}_darwin_x86_64.tar.gz"
          CHECKSUM_ASSET="oore_${VERSION}_checksums.txt"

          test -f "dist/$ARM64_ASSET"
          test -f "dist/$X64_ASSET"

          (
            cd dist
            shasum -a 256 "$ARM64_ASSET" "$X64_ASSET" > "$CHECKSUM_ASSET"
          )

          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/oore_${{ env.RELEASE_VERSION }}_darwin_arm64.tar.gz
            dist/oore_${{ env.RELEASE_VERSION }}_darwin_x86_64.tar.gz
            dist/oore_${{ env.RELEASE_VERSION }}_checksums.txt
